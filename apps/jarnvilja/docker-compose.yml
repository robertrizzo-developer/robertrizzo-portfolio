services:
  db:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jarnviljadb}
      POSTGRES_USER: ${POSTGRES_USER:-jarnvilja}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jarnvilja}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jarnvilja} -d ${POSTGRES_DB:-jarnviljadb}"]
      interval: 5s
      timeout: 5s
      retries: 8

  app:
    build: .
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-jarnviljadb}
      DB_USERNAME: ${POSTGRES_USER:-jarnvilja}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-jarnvilja}
      DDL_AUTO: ${DDL_AUTO:-update}

volumes:
  pg_data:
